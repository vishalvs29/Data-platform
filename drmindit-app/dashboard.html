        <!-- Bottom Navigation -->
        <nav id="bottom-nav" class="bottom-nav">

                <button class="nav-item" data-page="explore" id="nav-explore">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <span>Explore</span>
                </button>
                <button class="nav-item calm-now-btn" data-page="calm" id="nav-calm">
                    <div class="calm-now-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">

                                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" />
                        </svg>
                    </div>
                    <span>Calm Now</span>
                </button>
                <button class="nav-item" data-page="chat" id="nav-chat">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                    </svg>
                    <span>Chat</span>
                </button>
                <button class="nav-item" data-page="analytics" id="nav-analytics">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 20V10" />
                        <path d="M12 20V4" />
                        <path d="M6 20v-6" />
                    </svg>
                    <span>Analytics</span>
                </button>
                <button class="nav-item" data-page="profile" id="nav-profile">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                    <span>Profile</span>
                </button>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/howler@2.2.3/dist/howler.min.js"></script>

    <script src="js/session-scripts-2.js"></script>
    <script src="js/session-scripts-3.js"></script>
    <script src="js/session-scripts-30min.js"></script>
    <script src="js/audio-engine.js"></script>
    <script src="js/analytics.js"></script>

    <script src="js/resilience-program.js"></script>

    <script src="js/state.js"></script>
    <script src="js/components.js"></script>
    <script src="js/pages.js"></script>
    <script src="js/router.js"></script>
    <!-- Session auth guard: redirect to login if no active session -->
    <script>
        (async function sessionGuard() {
            // ── Testing Bypass ──
            if (localStorage.getItem('drmindit_test_mode') === 'true') {
                console.log('✦ DrMindit: Test Mode Active. Skipping session guard.');
                if (window.DrMinditAuth && !DrMinditAuth.session) {
                    await DrMinditAuth.init();
                }
                return;
            }

            const { data: { session } } = await DrMinditSupabase.auth.getSession();
            if (!session) {
                // No active session — redirect to login
                window.location.replace('login.html');
                return;
            }
            // Populate user from session
            if (window.DrMinditAuth) {
                DrMinditAuth.session = session;
                DrMinditAuth.user = session.user;
                // Load DB profile into DrMinditData.user
                await DrMinditAuth._loadProfile(session.user.id);
            }
        })();
    </script>
    <script src="js/app.js"></script>
</body>

</html>
