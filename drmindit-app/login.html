<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DrMindit — Secure member login">
    <title>DrMindit — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
    <style>
        .auth-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 24px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            padding: 4px;
        }

        .auth-tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: #64748b;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .auth-tab.active {
            background: rgba(20, 184, 166, 0.15);
            color: #14b8a6;
        }

        .auth-panel {
            display: none;
        }

        .auth-panel.active {
            display: block;
        }

        #auth-error {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 16px;
        }

        #auth-success {
            display: none;
            background: rgba(20, 184, 166, 0.1);
            border: 1px solid rgba(20, 184, 166, 0.3);
            color: #14b8a6;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 16px;
        }

        .reset-link {
            color: #14b8a6;
            font-size: 0.82rem;
            cursor: pointer;
            text-decoration: underline;
            background: none;
            border: none;
            padding: 0;
        }

        .reset-link:hover {
            opacity: 0.8;
        }

        .password-requirements {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 4px;
        }

        .google-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 12px;
            background: #fff;
            color: #1f2937;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
        }

        .google-button:hover {
            background: #f9fafb;
            border-color: #d1d5db;
            transform: translateY(-1px);
        }

        .google-button svg {
            width: 18px;
            height: 18px;
        }
    </style>
</head>

<body class="login-page">

    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">
                <div
                    style="width:28px; height:28px; background:linear-gradient(135deg,#14b8a6,#8b5cf6); border-radius:6px;">
                </div>
                <span>DRMINDIT</span>
            </div>
            <h1 class="login-title">Member Access</h1>
            <p class="login-subtitle">Secure access · AES-256 Encrypted</p>
        </div>

        <!-- Error / Success banners -->
        <div id="auth-error"></div>
        <div id="auth-success"></div>

        <!-- Tabs: Login / Sign Up / Reset -->
        <div class="auth-tabs" id="auth-tabs">
            <button class="auth-tab active" onclick="DrMinditLoginUI.showTab('login')">Sign In</button>
            <button class="auth-tab" onclick="DrMinditLoginUI.showTab('signup')">Create Account</button>
            <button class="auth-tab" onclick="DrMinditLoginUI.showTab('reset')">Reset Password</button>
        </div>

        <!-- ── LOGIN PANEL ── -->
        <div class="auth-panel active" id="panel-login">
            <!-- Google Login -->
            <button class="google-button" onclick="DrMinditLoginUI.handleGoogleLogin()">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4" />
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853" />
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                        fill="#FBBC05" />
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z"
                        fill="#EA4335" />
                </svg>
                Continue with Google
            </button>

            <!-- SSO Button -->
            <button class="sso-button" onclick="DrMinditLoginUI.handleSSO()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                </svg>
                Sign in with Enterprise SSO
            </button>
            <div class="divider">Or use work email</div>

            <div class="input-group">
                <label class="input-label">Work Email</label>
                <div class="input-wrapper">
                    <input type="email" id="login-email" class="input-field" placeholder="name@organization.com"
                        autocomplete="email" oninput="DrMinditLoginUI.clearMessages()">
                </div>
            </div>
            <div class="input-group">
                <label class="input-label">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="login-password" class="input-field" placeholder="Enter your password"
                        autocomplete="current-password"
                        onkeydown="if(event.key==='Enter') DrMinditLoginUI.handleLogin()">
                </div>
            </div>
            <button class="login-btn" id="auth-submit-btn" data-label="Sign In" onclick="DrMinditLoginUI.handleLogin()">
                Secure Sign In
            </button>
            <div style="text-align:center;margin-top:12px;">
                <button class="reset-link" onclick="DrMinditLoginUI.showTab('reset')">Forgot password?</button>
            </div>
        </div>

        <!-- ── SIGN UP PANEL ── -->
        <div class="auth-panel" id="panel-signup">
            <div class="input-group">
                <label class="input-label">Full Name</label>
                <div class="input-wrapper">
                    <input type="text" id="signup-name" class="input-field" placeholder="Your full name"
                        autocomplete="name">
                </div>
            </div>
            <div class="input-group">
                <label class="input-label">Work Email</label>
                <div class="input-wrapper">
                    <input type="email" id="signup-email" class="input-field" placeholder="name@organization.com"
                        autocomplete="email">
                </div>
            </div>
            <div class="input-group">
                <label class="input-label">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="signup-password" class="input-field" placeholder="Min. 8 characters"
                        autocomplete="new-password" onkeydown="if(event.key==='Enter') DrMinditLoginUI.handleSignup()">
                </div>
                <div class="password-requirements">Minimum 8 characters · at least one number</div>
            </div>
            <div class="input-group">
                <label class="input-label">Organization (Optional)</label>
                <div class="input-wrapper">
                    <input type="text" id="signup-org" class="input-field" placeholder="Company or agency name">
                </div>
            </div>
            <button class="login-btn" id="auth-submit-btn" data-label="Create Account"
                onclick="DrMinditLoginUI.handleSignup()">
                Create Account
            </button>
        </div>

        <!-- ── PASSWORD RESET PANEL ── -->
        <div class="auth-panel" id="panel-reset">
            <p style="font-size:0.88rem;color:#94a3b8;margin-bottom:20px;line-height:1.5;">
                Enter your email address and we'll send you a secure reset link.
                The link expires in 1 hour.
            </p>
            <div class="input-group">
                <label class="input-label">Work Email</label>
                <div class="input-wrapper">
                    <input type="email" id="reset-email" class="input-field" placeholder="name@organization.com"
                        autocomplete="email" onkeydown="if(event.key==='Enter') DrMinditLoginUI.handleReset()">
                </div>
            </div>
            <button class="login-btn" id="auth-submit-btn" data-label="Send Reset Link"
                onclick="DrMinditLoginUI.handleReset()">
                Send Reset Link
            </button>
        </div>

        <!-- ── NEW PASSWORD PANEL (shown after reset link click) ── -->
        <div class="auth-panel" id="panel-new-password" style="display:none;">
            <p style="font-size:0.88rem;color:#94a3b8;margin-bottom:20px;">
                Enter your new secure password below.
            </p>
            <div class="input-group">
                <label class="input-label">New Password</label>
                <div class="input-wrapper">
                    <input type="password" id="new-password" class="input-field" placeholder="Min. 8 characters"
                        autocomplete="new-password">
                </div>
            </div>
            <div class="input-group">
                <label class="input-label">Confirm Password</label>
                <div class="input-wrapper">
                    <input type="password" id="confirm-password" class="input-field" placeholder="Re-enter password"
                        onkeydown="if(event.key==='Enter') DrMinditLoginUI.handleUpdatePassword()">
                </div>
            </div>
            <button class="login-btn" id="auth-submit-btn" data-label="Update Password"
                onclick="DrMinditLoginUI.handleUpdatePassword()">
                Update Password
            </button>
        </div>

        <div class="security-badge">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            AES-256 · JWT Secured · HIPAA-Aligned
        </div>
    </div>

    <!-- Load Supabase SDK first -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/analytics.js"></script>
    <script src="js/auth.js"></script>

    <script>
        const DrMinditLoginUI = {
            _activeTab: 'login',

            getRedirectUrl() {
                const params = new URLSearchParams(window.location.search);
                const platform = params.get('platform');
                return platform ? `/dashboard#${platform}` : '/dashboard';
            },

            showTab(tab) {
                this._activeTab = tab;
                document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                const panel = document.getElementById(`panel-${tab}`);
                if (panel) panel.classList.add('active');
                const tabs = document.querySelectorAll('.auth-tab');
                const tabMap = { login: 0, signup: 1, reset: 2 };
                if (tabs[tabMap[tab]]) tabs[tabMap[tab]].classList.add('active');
                this.clearMessages();
            },

            clearMessages() {
                document.getElementById('auth-error').style.display = 'none';
                document.getElementById('auth-success').style.display = 'none';
            },

            validateEmail(email) {
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            },

            validatePassword(pw) {
                if (pw.length < 8) return 'Password must be at least 8 characters.';
                if (!/\d/.test(pw)) return 'Password must contain at least one number.';
                return null;
            },

            async handleLogin() {
                const email = document.getElementById('login-email').value.trim();
                const password = document.getElementById('login-password').value;

                if (!this.validateEmail(email)) {
                    return DrMinditAuth._showError('Please enter a valid email address.');
                }
                if (!password) {
                    return DrMinditAuth._showError('Please enter your password.');
                }

                await DrMinditAuth.login(email, password, this.getRedirectUrl());
            },

            async handleSignup() {
                const name = document.getElementById('signup-name').value.trim();
                const email = document.getElementById('signup-email').value.trim();
                const password = document.getElementById('signup-password').value;
                const org = document.getElementById('signup-org').value.trim();

                if (!name) return DrMinditAuth._showError('Please enter your full name.');
                if (!this.validateEmail(email)) return DrMinditAuth._showError('Please enter a valid email address.');

                const pwError = this.validatePassword(password);
                if (pwError) return DrMinditAuth._showError(pwError);

                await DrMinditAuth.signUp(email, password, { name, organization: org }, this.getRedirectUrl());
            },

            async handleReset() {
                const email = document.getElementById('reset-email').value.trim();
                if (!this.validateEmail(email)) {
                    return DrMinditAuth._showError('Please enter a valid email address.');
                }
                await DrMinditAuth.sendPasswordReset(email);
            },

            async handleUpdatePassword() {
                const newPw = document.getElementById('new-password').value;
                const confirmPw = document.getElementById('confirm-password').value;

                const pwError = this.validatePassword(newPw);
                if (pwError) return DrMinditAuth._showError(pwError);
                if (newPw !== confirmPw) return DrMinditAuth._showError('Passwords do not match.');

                await DrMinditAuth.updatePassword(newPw, this.getRedirectUrl());
            },

            async handleGoogleLogin() {
                await DrMinditAuth.signInWithGoogle();
            },

            handleSSO() {
                DrMinditAuth._showError('Enterprise SSO requires org configuration. Contact your administrator.');
            }
        };

        // On page load:
        // 1. Check if user is already logged in → redirect to app
        // 2. Check for password reset mode in URL
        (async function init() {
            // Check for ?mode=reset in URL (coming from email link)
            const params = new URLSearchParams(window.location.search);
            if (params.get('mode') === 'reset') {
                // Hide tabs, show new-password panel
                document.getElementById('auth-tabs').style.display = 'none';
                document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
                document.getElementById('panel-new-password').style.display = 'block';
            }

            DrMinditAnalytics.track('login_page_viewed');
        })();
    </script>
</body>

</html>
